<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Ended</title>
    <style>
        :root {
            --primary-blue: #0066cc;
            --primary-hover: #0052a3;
            --background-color: #f5f7fa;
            --card-background: #ffffff;
            --text-color: #333333;
            --success-color: #28a745;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .end-container {
            background: var(--card-background);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 60px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--success-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        
        .checkmark svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        
        h1 {
            color: var(--text-color);
            font-size: 28px;
            margin-bottom: 20px;
        }
        
        p {
            color: #666666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid var(--primary-blue);
            padding: 15px;
            margin-top: 30px;
            border-radius: 4px;
            text-align: left;
        }
        
        .info-box p {
            font-size: 14px;
            margin: 0;
        }

        .return-button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 20px;
            background-color: var(--primary-blue);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .return-button:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="end-container">
        <div class="checkmark">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <path d="M14 27l8 8L38 19"/>
                <circle cx="26" cy="26" r="25" fill="none" stroke="white" stroke-width="3"/>
            </svg>
        </div>
        
        <p>Your conversation has been saved successfully.
        You can now close this page.</p>

        <a href="{{ url_for('login') }}" class="return-button">Return to Login</a>
    </div>
    
    <script>
        // Clean up session when user closes this page
        window.addEventListener('beforeunload', function() {
            // Use sendBeacon for reliable delivery
            const blob = new Blob([JSON.stringify({})], { type: 'application/json' });
            navigator.sendBeacon('/api/cleanup_session', blob);
        });
        
        // Also handle visibility change
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                const blob = new Blob([JSON.stringify({})], { type: 'application/json' });
                navigator.sendBeacon('/api/cleanup_session', blob);
            }
        });
    </script>
</body>
</html>
