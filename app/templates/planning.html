<!DOCTYPE html>
<!--
  Planning page — shown to the participant at the very end of the study session.

  The participant arrives here by clicking the planning link in the final
  chatbot message. A beep plays automatically on page load so that nearby
  researchers can hear that the participant has reached this point.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning template</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-hover-blue) 100%);
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .planning-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="planning-card">
        <p>This was the end of the study. Thank you for participating!</p>
    </div>

</body>
</html>
